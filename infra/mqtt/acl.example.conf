# Esempio concettuale ACL MQTT.
# Adattare alla sintassi del broker scelto, ad esempio HiveMQ o EMQX.

user app_user_rover_dev_001
topic write rover/rover-dev-001/cmd
topic read rover/rover-dev-001/status
topic read rover/rover-dev-001/telemetry
topic read rover/rover-dev-001/events
topic read rover/rover-dev-001/agent/output

user agent_rover_dev_001
topic read rover/rover-dev-001/cmd
topic write rover/rover-dev-001/status
topic write rover/rover-dev-001/telemetry
topic write rover/rover-dev-001/events
topic write rover/rover-dev-001/agent/output
